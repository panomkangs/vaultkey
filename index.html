<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultKey — Password Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f0ed;--bg2:#e8e8e4;--surface:#fff;--surface2:#f7f7f5;
  --border:#dcdcd8;--border2:#c8c8c4;--text:#1a1a18;--text2:#5a5a56;--text3:#9a9a96;
  --accent:#2563eb;--accent2:#1d4ed8;--accent-light:#eff6ff;
  --green:#16a34a;--green-light:#f0fdf4;--red:#dc2626;--red-light:#fef2f2;
  --yellow:#ca8a04;--yellow-light:#fefce8;
  --radius:10px;--radius-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,0,0,.1),0 2px 6px rgba(0,0,0,.06);
  --shadow-lg:0 10px 30px rgba(0,0,0,.12),0 4px 12px rgba(0,0,0,.08);
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--sidebar-w:240px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
input,textarea,select,button{font-family:var(--font)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.screen{display:none}.screen.active{display:flex}

/* AUTH */
#authScreen{min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0f0ed,#e4e4e0)}
.auth-card{background:var(--surface);border-radius:20px;padding:44px;width:480px;max-width:98vw;box-shadow:var(--shadow-lg);border:1px solid var(--border)}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.auth-logo-icon{width:42px;height:42px;background:var(--text);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px}
.auth-logo-text{font-size:22px;font-weight:700;letter-spacing:-.5px}.auth-logo-text span{color:var(--accent)}
.auth-title{font-size:20px;font-weight:600;margin-bottom:6px}
.auth-sub{color:var(--text2);font-size:13px;margin-bottom:22px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:5px}
.form-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--surface);color:var(--text);transition:border-color .15s;outline:none}
.form-input:focus{border-color:var(--accent)}
.input-wrap{position:relative}.input-wrap .form-input{padding-right:42px}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);padding:2px;display:flex;align-items:center}
.eye-btn:hover{color:var(--text2)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .15s;text-decoration:none}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}.btn-primary:hover{background:#333}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-accent:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--border)}.btn-ghost:hover{background:var(--bg2);color:var(--text)}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:6px 12px;font-size:13px}.btn-full{width:100%;justify-content:center}
.btn-icon{padding:7px;border-radius:var(--radius-sm);background:none;border:1.5px solid var(--border);cursor:pointer;color:var(--text2);display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.btn-icon:hover{background:var(--bg2);color:var(--text);border-color:var(--border2)}
.btn-icon.danger:hover{background:var(--red-light);color:var(--red);border-color:var(--red)}
.forgot-link{text-align:right;margin-top:-6px;margin-bottom:14px}
.forgot-link a{color:var(--accent);font-size:13px;text-decoration:none;cursor:pointer}
.forgot-link a:hover{text-decoration:underline}
.auth-switch{text-align:center;font-size:13px;color:var(--text3);margin-top:14px}
.auth-switch a{color:var(--accent);cursor:pointer}
.config-section{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.config-section h4{font-size:12px;font-weight:600;margin-bottom:12px;color:var(--text2);letter-spacing:.4px;text-transform:uppercase}
.help-text{font-size:12px;color:var(--text3);margin-top:5px;line-height:1.5}
.help-text a{color:var(--accent);text-decoration:none}.help-text a:hover{text-decoration:underline}
.step-badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;margin-right:6px;flex-shrink:0}

/* APP */
#appScreen{flex-direction:row;min-height:100vh}
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:10;overflow-y:auto}
.sidebar-header{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo{display:flex;align-items:center;gap:9px}
.sidebar-logo-icon{width:32px;height:32px;background:var(--text);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.sidebar-logo-text{font-size:16px;font-weight:700;letter-spacing:-.3px}.sidebar-logo-text span{color:var(--accent)}
.sidebar-nav{flex:1;padding:12px 8px}
.nav-section{margin-bottom:20px}
.nav-section-label{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);padding:0 8px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);font-size:13.5px;transition:all .12s;position:relative;user-select:none}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:var(--accent-light);color:var(--accent);font-weight:500}
.nav-item .nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-item .nav-count{margin-left:auto;background:var(--bg2);color:var(--text3);font-size:11px;font-weight:500;padding:1px 7px;border-radius:20px;min-width:22px;text-align:center}
.nav-item.active .nav-count{background:var(--accent-light);color:var(--accent)}
.category-actions{display:none;margin-left:auto;gap:2px}
.nav-item:hover .category-actions{display:flex}
.nav-item:hover .nav-count{display:none}
.cat-action-btn{padding:2px 5px;border-radius:4px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;display:flex;align-items:center;transition:all .12s}
.cat-action-btn:hover{color:var(--text);background:var(--border)}
.cat-action-btn.del:hover{color:var(--red);background:var(--red-light)}
.add-category-btn{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text3);font-size:13px;border:1.5px dashed var(--border2);margin:4px 0;transition:all .12s}
.add-category-btn:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-light)}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border)}
.user-info{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:all .12s}
.user-info:hover{background:var(--bg2)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--text);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;flex-shrink:0}
.user-name{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conn-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:var(--radius-sm);margin-bottom:6px;font-size:12px;font-weight:500}
.conn-bar.connected{background:var(--green-light);color:var(--green)}
.conn-bar.local{background:var(--yellow-light);color:var(--yellow)}
.conn-bar .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:5}
.topbar-title{font-size:17px;font-weight:600;flex:1}
.search-wrap{position:relative}
.search-input{padding:8px 12px 8px 36px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13.5px;background:var(--bg);color:var(--text);outline:none;width:260px;transition:all .15s}
.search-input:focus{border-color:var(--accent);background:var(--surface);width:300px}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.content{flex:1;padding:24px}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.table-toolbar{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.table-toolbar-title{font-size:15px;font-weight:600;flex:1}
.toolbar-right{display:flex;gap:8px;align-items:center}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--surface2)}
th{text-align:left;padding:11px 14px;font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13.5px}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s}
tbody tr:hover{background:var(--surface2)}
.td-title{font-weight:500;color:var(--accent);cursor:pointer}
.td-title:hover{text-decoration:underline}
.td-mono{font-family:var(--mono);font-size:13px}
.pw-mask{letter-spacing:2px;color:var(--text3)}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:500}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-blue{background:var(--accent-light);color:var(--accent)}
.badge-grey{background:var(--bg2);color:var(--text3)}
.td-actions{display:flex;gap:5px;justify-content:flex-end}
.img-thumb{width:32px;height:32px;border-radius:6px;object-fit:cover;border:1px solid var(--border)}
.empty-state{text-align:center;padding:60px 24px;color:var(--text3)}
.empty-state .empty-icon{font-size:40px;margin-bottom:12px}
.empty-state h3{font-size:16px;font-weight:500;color:var(--text2);margin-bottom:6px}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.3);backdrop-filter:blur(2px);align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;border:1px solid var(--border)}
.modal-lg{max-width:680px}.modal-sm{max-width:400px}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.modal-header h3{font-size:16px;font-weight:600;flex:1}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:2px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group textarea.form-input{resize:vertical;min-height:80px}
.form-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.image-upload-area{border:2px dashed var(--border2);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:all .15s;background:var(--surface2);position:relative}
.image-upload-area:hover{border-color:var(--accent);background:var(--accent-light)}
.image-upload-area.has-image{padding:12px}
.image-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-placeholder{color:var(--text3)}
.upload-placeholder .upload-icon{font-size:28px;margin-bottom:8px}
.upload-placeholder p{font-size:13px}
.upload-placeholder span{font-size:12px}
.preview-img{max-width:100%;max-height:140px;border-radius:var(--radius-sm)}
.remove-img-btn{display:block;margin-top:8px;font-size:12px;color:var(--red);cursor:pointer;background:none;border:none;text-align:center;width:100%}
.custom-field-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);margin-bottom:6px}
.custom-field-item .cf-name{flex:1;font-size:13.5px;font-weight:500}
.custom-field-item .cf-type{font-size:12px;color:var(--text3);background:var(--bg2);padding:2px 8px;border-radius:4px}
.qv-grid{display:grid;grid-template-columns:120px 1fr;gap:12px 16px;align-items:start}
.qv-label{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding-top:2px}
.qv-value{font-size:14px;color:var(--text);word-break:break-all}
.qv-pw{font-family:var(--mono);background:var(--surface2);padding:6px 10px;border-radius:6px;display:flex;align-items:center;gap:8px}
.qv-pw .pw-text{flex:1;font-size:13px}
.copy-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px 5px;border-radius:4px}
.copy-btn:hover{background:var(--bg2);color:var(--text)}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:var(--radius);font-size:13.5px;font-weight:500;box-shadow:var(--shadow-md);border:1px solid;display:flex;align-items:center;gap:8px;animation:slideIn .2s ease;max-width:320px}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.success{background:var(--green-light);border-color:#86efac;color:var(--green)}
.toast.error{background:var(--red-light);border-color:#fca5a5;color:var(--red)}
.toast.info{background:var(--accent-light);border-color:#93c5fd;color:var(--accent)}
.loading-overlay{position:fixed;inset:0;z-index:9998;background:rgba(255,255,255,.75);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid var(--border2);border-top-color:var(--accent);animation:spin .7s linear infinite}
.loading-msg{font-size:13px;color:var(--text2)}
@keyframes spin{to{transform:rotate(360deg)}}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.section-header h2{font-size:20px;font-weight:700;flex:1}
.cat-manage-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);margin-bottom:8px}
.cat-manage-item .cat-icon{font-size:18px}
.cat-manage-item .cat-label{flex:1;font-weight:500}
.cat-manage-item .cat-count{font-size:12px;color:var(--text3)}
.pagination{display:flex;align-items:center;gap:6px;padding:14px 16px;border-top:1px solid var(--border)}
.pagination-info{font-size:13px;color:var(--text3);flex:1}
.page-btn{padding:5px 10px;border:1.5px solid var(--border);border-radius:5px;background:var(--surface);cursor:pointer;font-size:13px;color:var(--text2);transition:all .12s}
.page-btn:hover{background:var(--bg2);border-color:var(--border2);color:var(--text)}
.page-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
.confirm-box{text-align:center;padding:8px 0 4px}
.confirm-box .confirm-icon{font-size:36px;margin-bottom:12px}
.confirm-box h3{font-size:16px;font-weight:600;margin-bottom:8px}
.confirm-box p{font-size:14px;color:var(--text2)}
</style>
</head>
<body>

<div id="authScreen" class="screen active">
  <div class="auth-card" id="authCard"></div>
</div>

<div id="appScreen" class="screen">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">🔐</div>
        <div class="sidebar-logo-text">Vault<span>Key</span></div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">Menu</div>
        <div class="nav-item active" data-view="all" onclick="switchView('all')"><span class="nav-icon">🔑</span>All Passwords<span class="nav-count" id="countAll">0</span></div>
        <div class="nav-item" data-view="starred" onclick="switchView('starred')"><span class="nav-icon">⭐</span>Favorites<span class="nav-count" id="countStarred">0</span></div>
        <div class="nav-item" data-view="inactive" onclick="switchView('inactive')"><span class="nav-icon">🗂</span>Inactive<span class="nav-count" id="countInactive">0</span></div>
      </div>
      <div class="nav-section">
        <div class="nav-section-label">Categories</div>
        <div id="categoryNav"></div>
        <div class="add-category-btn" onclick="openAddCategory()"><span>＋</span>Add Category</div>
      </div>
      <div class="nav-section">
        <div class="nav-section-label">Settings</div>
        <div class="nav-item" onclick="switchView('customFields')"><span class="nav-icon">🛠</span>Custom Fields</div>
        <div class="nav-item" onclick="switchView('categories')"><span class="nav-icon">🏷</span>Manage Categories</div>
        <div class="nav-item" data-view="connection" onclick="switchView('connection')"><span class="nav-icon">🔗</span>Connection & Sync</div>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div id="sidebarConnStatus"></div>
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="user-name" id="userNameDisplay">User</div>
        <button class="btn-icon danger" title="Sign out" onclick="logout()" style="border:none;padding:4px">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="topbar-title" id="viewTitle">All Passwords</div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search passwords…" oninput="onSearch(this.value)">
      </div>
      <button class="btn btn-ghost btn-sm" id="syncBtn" onclick="manualSync()">🔄 Sync</button>
      <button class="btn btn-primary" onclick="openAddPassword()">＋ Add Password</button>
    </div>
    <div class="content" id="mainContent"></div>
  </main>
</div>

<!-- Password Modal -->
<div class="modal-overlay" id="pwModal">
  <div class="modal modal-lg">
    <div class="modal-header"><h3 id="pwModalTitle">Add Password</h3><button class="modal-close" onclick="closeModal('pwModal')">✕</button></div>
    <div class="modal-body" id="pwModalBody"></div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal('pwModal')">Cancel</button><button class="btn btn-primary" onclick="savePassword()">Save</button></div>
  </div>
</div>

<!-- Quick View Modal -->
<div class="modal-overlay" id="qvModal">
  <div class="modal">
    <div class="modal-header"><h3 id="qvTitle">Password Details</h3><button class="modal-close" onclick="closeModal('qvModal')">✕</button></div>
    <div class="modal-body" id="qvBody"></div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal('qvModal')">Close</button><button class="btn btn-primary" onclick="editFromQV()">Edit</button></div>
  </div>
</div>

<!-- Category Modal -->
<div class="modal-overlay" id="catModal">
  <div class="modal modal-sm">
    <div class="modal-header"><h3 id="catModalTitle">Add Category</h3><button class="modal-close" onclick="closeModal('catModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Category Name</label><input type="text" class="form-input" id="catNameInput" placeholder="e.g. Banking…"></div>
      <div class="form-group"><label class="form-label">Icon (Emoji)</label><input type="text" class="form-input" id="catIconInput" placeholder="🏷" maxlength="4"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal('catModal')">Cancel</button><button class="btn btn-primary" onclick="saveCategory()">Save</button></div>
  </div>
</div>

<!-- Custom Field Modal -->
<div class="modal-overlay" id="cfModal">
  <div class="modal modal-sm">
    <div class="modal-header"><h3>Add Custom Field</h3><button class="modal-close" onclick="closeModal('cfModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Field Name</label><input type="text" class="form-input" id="cfNameInput" placeholder="e.g. PIN, Security Answer…"></div>
      <div class="form-group"><label class="form-label">Field Type</label>
        <select class="form-input" id="cfTypeInput">
          <option value="text">Text</option><option value="password">Password</option>
          <option value="number">Number</option><option value="url">URL</option>
          <option value="email">Email</option><option value="textarea">Long Text</option>
        </select>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal('cfModal')">Cancel</button><button class="btn btn-primary" onclick="saveCustomField()">Add Field</button></div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal modal-sm">
    <div class="modal-body">
      <div class="confirm-box">
        <div class="confirm-icon" id="confirmIcon">⚠️</div>
        <h3 id="confirmTitle">Confirm</h3><p id="confirmMsg"></p>

  </div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ═══════════════════════════ STATE ═══════════════════════════
let STATE={
  config:{gasUrl:'',secretToken:'',masterHash:'',recoveryEmail:''},
  passwords:[],categories:[],customFields:[],
  currentView:'all',searchQuery:'',
  editingId:null,editingCatId:null,qvId:null,
  page:1,pageSize:15,syncMode:'local'
};
const SK={CONFIG:'vk_config',SESSION:'vk_session',DATA_PW:'vk_passwords',DATA_CAT:'vk_categories',DATA_CF:'vk_customfields'};
const SHEETS={PASSWORDS:'Passwords',CATEGORIES:'Categories',CUSTOM_FIELDS:'CustomFields'};

// ══════════════════════════ CRYPTO ═══════════════════════════
async function hashPassword(pw){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw+'vaultkey_salt_2024'));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function generateId(){return Date.now().toString(36)+Math.random().toString(36).substr(2,6);}

// ════════════════════════ LOCAL STORAGE ══════════════════════
function loadConfig(){const s=localStorage.getItem(SK.CONFIG);return s?JSON.parse(s):null;}
function saveConfig(cfg){localStorage.setItem(SK.CONFIG,JSON.stringify(cfg));}
function checkSession(){const s=sessionStorage.getItem(SK.SESSION);if(!s)return false;return Date.now()-JSON.parse(s).ts<8*60*60*1000;}
function setSession(){sessionStorage.setItem(SK.SESSION,JSON.stringify({ts:Date.now()}));}
function clearSession(){sessionStorage.removeItem(SK.SESSION);}
function loadLocalData(){
  STATE.passwords=JSON.parse(localStorage.getItem(SK.DATA_PW)||'[]');
  STATE.categories=JSON.parse(localStorage.getItem(SK.DATA_CAT)||'[]');
  STATE.customFields=JSON.parse(localStorage.getItem(SK.DATA_CF)||'[]');
}
function saveLocalData(){
  localStorage.setItem(SK.DATA_PW,JSON.stringify(STATE.passwords));
  localStorage.setItem(SK.DATA_CAT,JSON.stringify(STATE.categories));
  localStorage.setItem(SK.DATA_CF,JSON.stringify(STATE.customFields));
}

// ═══════════════════ GOOGLE APPS SCRIPT API ═══════════════════
async function gasRead(sheet){
  const url=STATE.config.gasUrl; if(!url) return null;
  const token=STATE.config.secretToken||'';
  try{
    const r=await fetch(`${url}?action=read&sheet=${encodeURIComponent(sheet)}&token=${encodeURIComponent(token)}&t=${Date.now()}`,{method:'GET'});
    if(!r.ok) return null;
    const d=await r.json();
    if(d.error==='Unauthorized'){showToast('Invalid Secret Token — check Connection settings','error');return null;}
    return d.values||null;
  }catch{return null;}
}

async function gasWrite(sheet,values){
  const url=STATE.config.gasUrl;
  if(!url){saveLocalData();return false;}
  const token=STATE.config.secretToken||'';
  try{
    const r=await fetch(url,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'write',sheet,values,token})
    });
    saveLocalData();
    if(!r.ok) return false;
    const d=await r.json();
    if(d.error==='Unauthorized'){showToast('Invalid Secret Token — check Connection settings','error');return false;}
    return d.success===true;
  }catch{saveLocalData();return false;}
}

async function testConnection(url,token){
  token=token||'';
  try{
    const r=await fetch(`${url}?action=ping&token=${encodeURIComponent(token)}&t=${Date.now()}`,{method:'GET'});
    if(!r.ok) return false;
    const d=await r.json();
    if(d.error==='Unauthorized') return 'unauthorized';
    return !!(d.pong||d.values!==undefined||d.error!==undefined);
  }catch{return false;}
}

// ═══════════════════════ SYNC FROM GAS ════════════════════════
async function syncFromGAS(){
  if(!STATE.config.gasUrl){loadLocalData();STATE.syncMode='local';return;}
  showLoading('Syncing from Google Sheets…');
  try{
    const pw=await gasRead(SHEETS.PASSWORDS);
    if(pw&&pw.length>1){
      const hdr=pw[0];
      STATE.passwords=pw.slice(1).map(row=>{const obj={};hdr.forEach((h,i)=>obj[h]=row[i]||'');return obj;});
    } else if(pw&&pw.length<=1){STATE.passwords=[];}

    const cat=await gasRead(SHEETS.CATEGORIES);
    if(cat&&cat.length>1){
      STATE.categories=cat.slice(1).map(r=>({id:r[0]||'',name:r[1]||'',icon:r[2]||'🏷'}));
    }

    const cf=await gasRead(SHEETS.CUSTOM_FIELDS);
    if(cf&&cf.length>1){
      STATE.customFields=cf.slice(1).map(r=>({id:r[0]||'',name:r[1]||'',type:r[2]||'text'}));
    }
    STATE.syncMode='gas';
    saveLocalData();
    updateSyncStatus(true);
  }catch{
    loadLocalData();STATE.syncMode='local';updateSyncStatus(false);
  }
  hideLoading();
}

// ═════════════════════════ PUSH DATA ══════════════════════════
async function pushPasswords(){
  const headers=['id','title','categoryId','username','password','website','note','bindEmail','status','starred','imageData',
    ...STATE.customFields.map(f=>'cf_'+f.id)];
  const values=[headers,...STATE.passwords.map(p=>headers.map(h=>p[h]!==undefined?String(p[h]):''))];
  const ok=await gasWrite(SHEETS.PASSWORDS,values);
  if(!ok&&STATE.syncMode==='gas') showToast('⚠️ Saved locally — Sheets sync failed','info');
  saveLocalData();
}
async function pushCategories(){
  const values=[['id','name','icon'],...STATE.categories.map(c=>[c.id,c.name,c.icon])];
  await gasWrite(SHEETS.CATEGORIES,values); saveLocalData();
}
async function pushCustomFields(){
  const values=[['id','name','type'],...STATE.customFields.map(f=>[f.id,f.name,f.type])];
  await gasWrite(SHEETS.CUSTOM_FIELDS,values); saveLocalData();
}

function updateSyncStatus(connected){
  const el=document.getElementById('sidebarConnStatus'); if(!el) return;
  if(!STATE.config.gasUrl){
    el.innerHTML=`<div class="conn-bar local"><span class="dot"></span>Local Mode Only</div>`;
  } else if(connected){
    el.innerHTML=`<div class="conn-bar connected"><span class="dot"></span>Synced with Sheets ✓</div>`;
  } else {
    el.innerHTML=`<div class="conn-bar local"><span class="dot"></span>Sheets Offline — Local</div>`;
  }
}

async function manualSync(){
  const btn=document.getElementById('syncBtn');
  if(btn){btn.textContent='⏳ Syncing…';btn.disabled=true;}
  await syncFromGAS();
  renderSidebar();
  const v=STATE.currentView;
  if(v!=='customFields'&&v!=='categories'&&v!=='connection') renderPasswordsView();
  if(btn){btn.textContent='🔄 Sync';btn.disabled=false;}
  showToast('Sync complete','success');
}

// ═══════════════════════ AUTH SCREENS ═════════════════════════
function renderSetup(){
  document.getElementById('authCard').innerHTML=`
  <div class="auth-logo"><div class="auth-logo-icon">🔐</div><div class="auth-logo-text">Vault<span>Key</span></div></div>
  <div class="auth-title">Welcome! Let's get started</div>
  <div class="auth-sub">Create your master password. Connect Google Sheets via Apps Script for multi-device sync.</div>

  <div class="config-section">
    <h4>🔗 Google Apps Script Backend (Multi-Device Sync)</h4>
    <div class="form-group">
      <label class="form-label">Apps Script Web App URL</label>
      <input type="text" class="form-input" id="setupGasUrl" placeholder="https://script.google.com/macros/s/…/exec">
      <p class="help-text">Leave blank to use local storage only.</p>
    </div>
    <div class="form-group">
      <label class="form-label">🔒 Secret Token</label>
      <div class="input-wrap">
        <input type="password" class="form-input" id="setupSecretToken" placeholder="e.g. MyS3cretKey2024!">
        <button class="eye-btn" onclick="toggleVis('setupSecretToken',this)">👁</button>
      </div>
      <p class="help-text">Must match the SECRET value in your Apps Script code. Leave blank if not using token.</p>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
      <button class="btn btn-ghost btn-sm" onclick="testGasUrlSetup()">🧪 Test Connection</button>
      <span id="testResult" style="font-size:12px"></span>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">Master Password</label>
    <div class="input-wrap"><input type="password" class="form-input" id="setupMaster" placeholder="Min 6 characters"><button class="eye-btn" onclick="toggleVis('setupMaster',this)">👁</button></div>
  </div>
  <div class="form-group">
    <label class="form-label">Confirm Master Password</label>
    <div class="input-wrap"><input type="password" class="form-input" id="setupMaster2" placeholder="Repeat password"><button class="eye-btn" onclick="toggleVis('setupMaster2',this)">👁</button></div>
  </div>
  <div class="form-group">
    <label class="form-label">Recovery Email</label>
    <input type="email" class="form-input" id="setupEmail" placeholder="your@email.com">
    <p class="help-text">Stored locally only. Used as a reminder reference.</p>
  </div>
  <button class="btn btn-primary btn-full" onclick="doSetup()">🚀 Create Vault</button>`;
}

async function testGasUrlSetup(){
  const url=document.getElementById('setupGasUrl').value.trim();
  const token=document.getElementById('setupSecretToken')?.value.trim()||'';
  const el=document.getElementById('testResult');
  if(!url){el.innerHTML='<span style="color:var(--red)">Enter URL first</span>';return;}
  el.innerHTML='<span style="color:var(--accent)">Testing…</span>';
  const ok=await testConnection(url,token);
  if(ok==='unauthorized') el.innerHTML='<span style="color:var(--red)">❌ Wrong Secret Token</span>';
  else el.innerHTML=ok?'<span style="color:var(--green)">✅ Connected & Token OK!</span>':'<span style="color:var(--red)">❌ Failed — check URL & deployment</span>';
}

function renderLogin(){
  document.getElementById('authCard').innerHTML=`
  <div class="auth-logo"><div class="auth-logo-icon">🔐</div><div class="auth-logo-text">Vault<span>Key</span></div></div>
  <div class="auth-title">Welcome back</div>
  <div class="auth-sub">Enter your master password to unlock your vault</div>
  <div class="form-group">
    <label class="form-label">Master Password</label>
    <div class="input-wrap"><input type="password" class="form-input" id="loginPw" placeholder="Master password" onkeydown="if(event.key==='Enter')doLogin()"><button class="eye-btn" onclick="toggleVis('loginPw',this)">👁</button></div>
  </div>
  <div class="forgot-link"><a onclick="renderForgot()">Forgot Password?</a></div>
  <button class="btn btn-primary btn-full" onclick="doLogin()">🔓 Unlock Vault</button>
  <div class="auth-switch">New device? <a onclick="renderSetup()">Setup vault</a></div>`;
  setTimeout(()=>document.getElementById('loginPw')?.focus(),100);
}

function renderForgot(){
  const cfg=loadConfig();
  const masked=cfg?.recoveryEmail?cfg.recoveryEmail.replace(/(.{2})(.*)(@.*)/,'$1***$3'):'Not set';
  document.getElementById('authCard').innerHTML=`
  <div class="auth-logo"><div class="auth-logo-icon">🔐</div><div class="auth-logo-text">Vault<span>Key</span></div></div>
  <div class="auth-title">Recover Access</div>
  <div class="auth-sub">Recovery email: <strong>${masked}</strong></div>
  <div style="background:var(--yellow-light);border:1px solid #fde68a;border-radius:var(--radius);padding:14px;margin-bottom:16px;font-size:13px;color:var(--yellow)">
    ⚠️ Master password cannot be retrieved (hashed). Reset the local vault and re-setup using the same Apps Script URL — data in Google Sheet is preserved and will be restored automatically.
  </div>
  <button class="btn btn-danger btn-full" style="margin-bottom:10px" onclick="confirmResetVault()">🗑 Reset Local Vault</button>
  <button class="btn btn-ghost btn-full" onclick="renderLogin()">← Back to Login</button>`;
}

async function doSetup(){
  const gasUrl=document.getElementById('setupGasUrl').value.trim();
  const pw=document.getElementById('setupMaster').value;
  const pw2=document.getElementById('setupMaster2').value;
  const email=document.getElementById('setupEmail').value.trim();
  if(!pw) return showToast('Enter a master password','error');
  if(pw!==pw2) return showToast('Passwords do not match','error');
  if(pw.length<6) return showToast('Password must be at least 6 characters','error');
  showLoading('Creating vault…');
  const hash=await hashPassword(pw);
  const secretToken=document.getElementById('setupSecretToken')?.value.trim()||'';
  const cfg={gasUrl,secretToken,masterHash:hash,recoveryEmail:email};
  saveConfig(cfg); STATE.config=cfg;
  STATE.categories=[
    {id:generateId(),name:'Banking',icon:'🏦'},
    {id:generateId(),name:'Social Media',icon:'📱'},
    {id:generateId(),name:'Email',icon:'📧'},
    {id:generateId(),name:'Work',icon:'💼'},
    {id:generateId(),name:'Shopping',icon:'🛒'},
  ];
  await pushCategories();
  setSession(); hideLoading();
  showToast('Vault created! Welcome 🎉','success');
  loadApp();
}

async function doLogin(){
  const pw=document.getElementById('loginPw').value;
  if(!pw) return showToast('Enter your master password','error');
  showLoading('Unlocking…');
  const hash=await hashPassword(pw);
  const cfg=loadConfig();
  if(!cfg||hash!==cfg.masterHash){hideLoading();return showToast('Incorrect password','error');}
  STATE.config=cfg; setSession(); hideLoading(); loadApp();
}

function confirmResetVault(){
  showConfirm('⚠️','Reset Vault?','Clears all local data. Google Sheet data is preserved and will be restored on next setup.',()=>{
    [SK.CONFIG,SK.DATA_PW,SK.DATA_CAT,SK.DATA_CF].forEach(k=>localStorage.removeItem(k));
    clearSession(); showToast('Vault reset. Please set up again.','info'); renderSetup();
  });
}
function logout(){clearSession();document.getElementById('appScreen').classList.remove('active');document.getElementById('authScreen').classList.add('active');renderLogin();}

// ═══════════════════════ APP INIT ═════════════════════════════
async function loadApp(){
  document.getElementById('authScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  loadLocalData();
  await syncFromGAS();
  renderSidebar(); switchView('all');
  const email=STATE.config.recoveryEmail||'';
  document.getElementById('userAvatar').textContent=email?email[0].toUpperCase():'U';
  document.getElementById('userNameDisplay').textContent=email||'Vault User';
}

// ════════════════════════ SIDEBAR ═════════════════════════════
function renderSidebar(){
  document.getElementById('categoryNav').innerHTML=STATE.categories.map(c=>{
    const cnt=STATE.passwords.filter(p=>p.categoryId===c.id&&p.status!=='Inactive').length;
    return`<div class="nav-item" data-view="cat_${c.id}" onclick="switchView('cat_${c.id}')">
      <span class="nav-icon">${c.icon}</span>${escHtml(c.name)}
      <span class="nav-count">${cnt}</span>
      <span class="category-actions">
        <button class="cat-action-btn" onclick="event.stopPropagation();openEditCategory('${c.id}')">✏️</button>
        <button class="cat-action-btn del" onclick="event.stopPropagation();deleteCategory('${c.id}')">🗑</button>
      </span>
    </div>`;
  }).join('');
  document.getElementById('countAll').textContent=STATE.passwords.filter(p=>p.status!=='Inactive').length;
  document.getElementById('countStarred').textContent=STATE.passwords.filter(p=>p.starred==='true').length;
  document.getElementById('countInactive').textContent=STATE.passwords.filter(p=>p.status==='Inactive').length;
  updateSyncStatus(STATE.syncMode==='gas');
}

function setActiveNav(v){document.querySelectorAll('.nav-item[data-view]').forEach(el=>el.classList.toggle('active',el.dataset.view===v));}

// ════════════════════════ VIEWS ═══════════════════════════════
function switchView(view){
  STATE.currentView=view;STATE.page=1;
  setActiveNav(view);
  const titles={all:'All Passwords',starred:'Favorites',inactive:'Inactive',customFields:'Custom Fields',categories:'Manage Categories',connection:'Connection & Sync'};
  if(view.startsWith('cat_')){
    const cat=STATE.categories.find(c=>c.id===view.replace('cat_',''));
    document.getElementById('viewTitle').textContent=cat?`${cat.icon} ${cat.name}`:'Category';
  } else document.getElementById('viewTitle').textContent=titles[view]||'Passwords';
  if(view==='customFields') renderCustomFieldsView();
  else if(view==='categories') renderCategoriesView();
  else if(view==='connection') renderConnectionView();
  else renderPasswordsView();
}

function onSearch(q){STATE.searchQuery=q;STATE.page=1;renderPasswordsView();}

function getFiltered(){
  let list=[...STATE.passwords];
  const v=STATE.currentView;
  if(v==='starred') list=list.filter(p=>p.starred==='true');
  else if(v==='inactive') list=list.filter(p=>p.status==='Inactive');
  else if(v.startsWith('cat_')){const id=v.replace('cat_','');list=list.filter(p=>p.categoryId===id&&p.status!=='Inactive');}
  else list=list.filter(p=>p.status!=='Inactive');
  const q=STATE.searchQuery.toLowerCase();
  if(q) list=list.filter(p=>['title','username','website','note'].some(k=>(p[k]||'').toLowerCase().includes(q)));
  return list;
}

// ══════════════════════ PASSWORDS TABLE ═══════════════════════
function renderPasswordsView(){
  const filtered=getFiltered(),total=filtered.length;
  const pages=Math.ceil(total/STATE.pageSize)||1;
  const slice=filtered.slice((STATE.page-1)*STATE.pageSize,STATE.page*STATE.pageSize);
  const cfH=STATE.customFields.map(f=>`<th>${escHtml(f.name)}</th>`).join('');
  let rows='';
  if(!slice.length){
    rows=`<tr><td colspan="${8+STATE.customFields.length}" style="padding:0"><div class="empty-state"><div class="empty-icon">🔑</div><h3>No passwords found</h3><p>Add your first entry or adjust your search</p></div></td></tr>`;
  } else {
    rows=slice.map(p=>{
      const cat=STATE.categories.find(c=>c.id===p.categoryId);
      const catB=cat?`<span class="badge badge-blue">${cat.icon} ${escHtml(cat.name)}</span>`:`<span class="badge badge-grey">—</span>`;
      const stB=p.status==='Inactive'?`<span class="badge badge-red">Inactive</span>`:`<span class="badge badge-green">Active</span>`;
      const cfC=STATE.customFields.map(f=>`<td>${escHtml(p['cf_'+f.id]||'')}</td>`).join('');
      const img=p.imageData?`<img src="${p.imageData}" class="img-thumb" style="margin-top:4px">`:'';
      return`<tr>
        <td><span class="td-title" onclick="openQuickView('${p.id}')">${p.starred==='true'?'⭐ ':''}${escHtml(p.title||'—')}</span>${img?'<br>'+img:''}</td>
        <td>${catB}</td><td class="td-mono">${escHtml(p.username||'')}</td>
        <td><span class="pw-mask">••••••••</span></td>
        <td><a href="${escHtml(p.website||'#')}" target="_blank" style="color:var(--accent);font-size:12px">${escHtml(p.website?shortenUrl(p.website):'')}</a></td>
        <td>${stB}</td>
        <td>${p.bindEmail==='Yes'?'<span class="badge badge-green">Yes</span>':'<span class="badge badge-grey">No</span>'}</td>
        ${cfC}
        <td><div class="td-actions">
          <button class="btn-icon" title="Quick View" onclick="openQuickView('${p.id}')">👁</button>
          <button class="btn-icon" title="Edit" onclick="openEditPassword('${p.id}')">✏️</button>
          <button class="btn-icon danger" title="Delete" onclick="deletePassword('${p.id}')">🗑</button>
        </div></td>
      </tr>`;
    }).join('');
  }
  document.getElementById('mainContent').innerHTML=`
    <div class="table-wrap">
      <div class="table-toolbar">
        <span class="table-toolbar-title">${total} record${total!==1?'s':''}</span>
        <div class="toolbar-right">
          <button class="btn btn-ghost btn-sm" onclick="importCSV()">⬆ Import CSV</button>
          <button class="btn btn-ghost btn-sm" onclick="exportCSV()">⬇ Export CSV</button>
          <button class="btn btn-primary btn-sm" onclick="openAddPassword()">＋ Add</button>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table><thead><tr>
          <th>Title</th><th>Category</th><th>Username</th><th>Password</th>
          <th>Website</th><th>Status</th><th>Bind Email</th>
          ${cfH}<th style="text-align:right">Actions</th>
        </tr></thead><tbody>${rows}</tbody></table>
      </div>
      ${pages>1?renderPagination(STATE.page,pages,total):''}
    </div>`;
}

function renderPagination(page,pages,total){
  const s=(page-1)*STATE.pageSize+1,e=Math.min(page*STATE.pageSize,total);
  let b='';
  for(let i=1;i<=pages;i++){
    if(i===1||i===pages||Math.abs(i-page)<=1) b+=`<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
    else if(Math.abs(i-page)===2) b+=`<span style="color:var(--text3);padding:0 4px">…</span>`;
  }
  return`<div class="pagination"><span class="pagination-info">Showing ${s}–${e} of ${total}</span>
    <button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>‹</button>${b}
    <button class="page-btn" onclick="goPage(${page+1})" ${page>=pages?'disabled':''}>›</button></div>`;
}
function goPage(p){STATE.page=p;renderPasswordsView();}

// ═══════════════════ ADD / EDIT PASSWORD ══════════════════════
function openAddPassword(){STATE.editingId=null;document.getElementById('pwModalTitle').textContent='Add Password';renderPwForm(null);openModal('pwModal');}
function openEditPassword(id){STATE.editingId=id;document.getElementById('pwModalTitle').textContent='Edit Password';renderPwForm(STATE.passwords.find(x=>x.id===id));openModal('pwModal');}

function renderPwForm(p){
  const cats=STATE.categories.map(c=>`<option value="${c.id}" ${p&&p.categoryId===c.id?'selected':''}>${c.icon} ${escHtml(c.name)}</option>`).join('');
  const cfFields=STATE.customFields.map(f=>{
    const val=p?(p['cf_'+f.id]||''):'';

async function handleImageUpload(e){
  const file=e.target.files[0];if(!file) return;
  showLoading('Compressing image…');
  try{
    window._currentImageData=await compressImage(file,0.95*1024*1024);
    document.getElementById('imgUploadArea').innerHTML=`<img src="${window._currentImageData}" class="preview-img"><button class="remove-img-btn" onclick="removeImage()">Remove image</button><input type="file" accept="image/*" id="imgFileInput" onchange="handleImageUpload(event)" style="display:none">`;
  }catch{showToast('Image upload failed','error');}
  hideLoading();
}
function removeImage(){
  window._currentImageData='';
  document.getElementById('imgUploadArea').innerHTML=`<div class="upload-placeholder"><div class="upload-icon">🖼</div><p>Click to upload image</p><span>Auto-compressed &lt;1MB</span></div><input type="file" accept="image/*" id="imgFileInput" onchange="handleImageUpload(event)" style="position:absolute;opacity:0;inset:0;cursor:pointer">`;
}
async function compressImage(file,maxBytes){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const scale=Math.min(1,Math.sqrt(maxBytes/file.size));
        canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        let q=0.85;
        const go=()=>{const d=canvas.toDataURL('image/jpeg',q);if(d.length*.75<=maxBytes||q<0.2)res(d);else{q-=0.1;go();}};
        go();
      };
      img.onerror=rej;img.src=e.target.result;
    };
    reader.onerror=rej;reader.readAsDataURL(file);
  });
}

const GAS_CODE=`// VaultKey — Google Apps Script Backend
// Deploy → New deployment → Web App → Execute as: Me → Access: Anyone
// Set SECRET below to match what you enter in VaultKey app

const SS = SpreadsheetApp.getActiveSpreadsheet();
const SECRET = 'YOUR_SECRET_TOKEN_HERE'; // ← Change this (or leave blank to disable)

function doGet(e) {
  const token = e.parameter.token || '';
  if (SECRET && token !== SECRET) return json({ error: 'Unauthorized' });

  const action = e.parameter.action;
  if (action === 'ping') return json({ pong: true });
  if (action === 'read') {
    const sheet = e.parameter.sheet;
    const ws = SS.getSheetByName(sheet);
    if (!ws) return json({ values: [] });
    return json({ values: ws.getDataRange().getValues() });
  }
  return json({ error: 'Unknown GET action' });
}

function doPost(e) {
  try {
    const body = JSON.parse(e.postData.contents);
    const token = body.token || '';
    if (SECRET && token !== SECRET) return json({ error: 'Unauthorized' });

    if (body.action === 'write') {
      let ws = SS.getSheetByName(body.sheet);
      if (!ws) ws = SS.insertSheet(body.sheet);
      ws.clearContents();
      if (body.values && body.values.length > 0) {
        ws.getRange(1, 1, body.values.length, body.values[0].length)
          .setValues(body.values);
      }
      return json({ success: true });
    }
    return json({ error: 'Unknown POST action' });
  } catch(err) {
    return json({ error: err.toString() });
  }
}

function json(obj) {
  return ContentService
    .createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}`;

function exportCSV(){
  const headers=['id','title','categoryName','username','password','website','note','bindEmail','status','starred',...STATE.customFields.map(f=>f.name)];
  const rows=STATE.passwords.map(p=>{
    const cat=STATE.categories.find(c=>c.id===p.categoryId);
    return[p.id,p.title,cat?.name||'',p.username,p.password,p.website,p.note,p.bindEmail,p.status,p.starred,...STATE.customFields.map(f=>p['cf_'+f.id]||'')]
      .map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',');
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([[headers.join(','),...rows].join('\n')],{type:'text/csv'}));
  a.download=`vaultkey_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  showToast('Exported successfully','success');
}

function importCSV(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.csv';
  inp.onchange=async e=>{
    const file=e.target.files[0];if(!file) return;
    const text=await file.text();
    const lines=text.split('\n').filter(l=>l.trim());
    if(lines.length<2) return showToast('CSV is empty','error');
    const headers=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
    const imported=lines.slice(1).map(line=>{
      const vals=parseCSVLine(line);const obj={};headers.forEach((h,i)=>obj[h]=vals[i]||'');
      const cat=STATE.categories.find(c=>c.name.toLowerCase()===(obj.categoryName||'').toLowerCase());
      const pw={id:obj.id||generateId(),title:obj.title||'',categoryId:cat?.id||'',username:obj.username||'',password:obj.password||'',website:obj.website||'',note:obj.note||'',bindEmail:obj.bindEmail||'No',status:obj.status||'Active',starred:obj.starred||'false',imageData:''};
      STATE.customFields.forEach(f=>{pw['cf_'+f.id]=obj[f.name]||'';});
      return pw;
    });
    showConfirm('⬆','Import CSV?',`Import ${imported.length} passwords? Existing IDs will be overwritten.`,async()=>{
      imported.forEach(imp=>{const idx=STATE.passwords.findIndex(p=>p.id===imp.id);if(idx!==-1)STATE.passwords[idx]=imp;else STATE.passwords.push(imp);});
      showLoading('Importing…');await pushPasswords();hideLoading();
      renderSidebar();renderPasswordsView();showToast(`Imported ${imported.length} passwords`,'success');
    });
  };inp.click();
}
function parseCSVLine(line){
  const result=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(line[i]===','&&!inQ){result.push(cur);cur='';}
    else cur+=line[i];
  }
  result.push(cur);return result;
}

// ═══════════════════════ UTILITIES ════════════════════════════
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return String(s||'').replace(/'/g,"\\'").replace(/"/g,'\\"');}
function shortenUrl(u){try{return new URL(u).hostname.replace(/^www\./,'');}catch{return u;}}
function toggleVis(id,btn){const el=document.getElementById(id);if(!el)return;el.type=el.type==='password'?'text':'password';btn.textContent=el.type==='password'?'👁':'🙈';}
function copyText(text,msg){navigator.clipboard.writeText(text).then(()=>showToast(msg||'Copied!','success')).catch(()=>showToast('Copy failed','error'));}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});});

function showConfirm(icon,title,msg,onConfirm){
  document.getElementById('confirmIcon').textContent=icon;
  document.getElementById('confirmTitle').textContent=title;
  document.getElementById('confirmMsg').textContent=msg;
  document.getElementById('confirmBtn').onclick=()=>{closeModal('confirmModal');onConfirm();};
  openModal('confirmModal');
}

function showToast(msg,type='info'){
  const icons={success:'✅',error:'❌',info:'ℹ️'};
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span>${icons[type]||'ℹ️'}</span>${escHtml(msg)}`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);},3500);
}

let loadingEl=null;
function showLoading(msg=''){
  if(loadingEl) return;
  loadingEl=document.createElement('div');
  loadingEl.className='loading-overlay';
  loadingEl.innerHTML=`<div class="spinner"></div>${msg?`<div class="loading-msg">${escHtml(msg)}</div>`:''}`;
  document.body.appendChild(loadingEl);
}
function hideLoading(){if(loadingEl){loadingEl.remove();loadingEl=null;}}

// ═══════════════════════════ INIT ═════════════════════════════
(function init(){
  const cfg=loadConfig();
  if(!cfg){renderSetup();return;}
  if(checkSession()){STATE.config=cfg;loadApp();}
  else renderLogin();
})();
</script>
